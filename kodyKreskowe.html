<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator kodów kreskowych</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
:root{
  --bg:#000;
  --panel:rgba(255,255,255,0.04);
  --text:#fff;
  --muted:rgba(255,255,255,0.6);
  --primary:#7c6cff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

.wrapper{
  display:flex;
  min-height:100vh;
}

.panel{
  width:420px;
  padding:1.5rem;
  background:var(--panel);
  border-right:1px solid rgba(255,255,255,0.08);
  display:flex;
  flex-direction:column;
  gap:1rem;
}

.section{
  display:flex;
  flex-direction:column;
  gap:.4rem;
}

.section-title{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--muted);
}

input,select{
  width:100%;
  padding:.7rem;
  border-radius:.8rem;
  border:1px solid rgba(255,255,255,0.08);
  background:#111;
  color:#fff;
}

.btn{
  padding:.9rem;
  border:none;
  border-radius:.8rem;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
}

.back{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:42px;
  border-radius:12px;
  background:#111;
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
  text-decoration:none;
  font-size:18px;
}

.preview{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem;
}

.barcode-box{
  background:#fff;
  padding:1.5rem;
  border-radius:1rem;
  display:flex;
  align-items:center;
  justify-content:center;
}

@media (max-width:900px){
  .wrapper{flex-direction:column;}
  .panel{width:100%;}
}

@media (max-width:500px){
  .barcode-box{transform:scale(.85);}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="panel">

<a href="index.html" class="back">←</a>

<h2>Kody kreskowe</h2>

<div class="section">
  <div class="section-title">Typ</div>
  <select id="format">
    <option value="CODE128">CODE128</option>
    <option value="EAN13">EAN-13</option>
  </select>
</div>

<div class="section">
  <div class="section-title">Treść</div>
  <input id="text" placeholder="123456789012">
</div>

<div class="section">
  <div class="section-title">Szerokość kreski</div>
  <input type="range" id="width" min="1" max="4" value="2">
</div>

<div class="section">
  <div class="section-title">Wysokość</div>
  <input type="range" id="height" min="40" max="160" value="80">
</div>

<button class="btn" onclick="generate()">Generuj</button>
<button class="btn" onclick="download()">Pobierz PNG</button>

</div>

<div class="preview">
  <div class="barcode-box">
    <svg id="barcode"></svg>
  </div>
</div>

</div>

<script>

const barcodeEl = document.getElementById("barcode");
const textInput = document.getElementById("text");

function generate(){

  const format = document.getElementById("format").value;
  let value = textInput.value.trim();

  // fallback
  if(!value) value = "123456789012";

  // 🔥 EAN13 FIX (live, bez blokowania inputa)
  if(format === "EAN13"){
    value = value.replace(/\D/g, "").slice(0, 12);
  }

  try{
    JsBarcode(barcodeEl, value, {
      format,
      lineColor:"#000",
      background:"#fff",
      width:+document.getElementById("width").value,
      height:+document.getElementById("height").value,
      displayValue:true
    });
  }catch(e){
    // brak alertów = brak crashy UX
    console.log("barcode error");
  }
}

/* LIVE UPDATE */
document.addEventListener("input", generate);

/* START */
generate();

/* DOWNLOAD */
function download(){
  const svg = barcodeEl;
  const xml = new XMLSerializer().serializeToString(svg);

  const img = new Image();
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);

    const a = document.createElement("a");
    a.download = "barcode.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  };

  img.src = "data:image/svg+xml;base64," + btoa(xml);
}

</script>

</body>
</html>
